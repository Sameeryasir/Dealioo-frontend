<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clear Retention cache</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 32rem;
        margin: 3rem auto;
        padding: 0 1rem;
        color: #18181b;
      }
      .ok {
        color: #15803d;
      }
      .err {
        color: #b91c1c;
      }
    </style>
  </head>
  <body>
    <h1>Clearing local cache…</h1>
    <p id="status">Working…</p>
    <script>
      const CHAT_DB = "dealioo-chat";
      const LEGACY_CHAT_DB = "retention-chat";
      const FUNNEL_DB = "dealioo-funnel-templates";
      const LEGACY_FUNNEL_DB = "retention-funnel-templates";
      const CHAT_MSG_PREFIX = "dealioo-chat-";
      const PREFIXES = ["retention:funnel-template:", "retention-chat", "dealioo-chat"];

      function deleteDb(name) {
        return new Promise(function (resolve, reject) {
          var request = indexedDB.deleteDatabase(name);
          request.onsuccess = function () {
            resolve();
          };
          request.onerror = function () {
            reject(request.error || new Error("delete failed"));
          };
          request.onblocked = function () {
            resolve();
          };
        });
      }

      function clearLocalStorage() {
        var keys = [];
        for (var i = 0; i < localStorage.length; i += 1) {
          var key = localStorage.key(i);
          if (!key) continue;
          for (var j = 0; j < PREFIXES.length; j += 1) {
            if (key.indexOf(PREFIXES[j]) === 0) {
              keys.push(key);
              break;
            }
          }
        }
        keys.forEach(function (key) {
          localStorage.removeItem(key);
        });
      }

      function deletePerConversationChatDbs() {
        if (!indexedDB.databases) {
          return Promise.resolve();
        }
        return indexedDB.databases().then(function (dbs) {
          return Promise.all(
            dbs
              .map(function (info) {
                return info.name;
              })
              .filter(function (name) {
                return name && name.indexOf(CHAT_MSG_PREFIX) === 0;
              })
              .map(function (name) {
                return deleteDb(name);
              }),
          );
        });
      }

      Promise.all([
        deleteDb(CHAT_DB),
        deleteDb(LEGACY_CHAT_DB),
        deletePerConversationChatDbs(),
        deleteDb(FUNNEL_DB),
        deleteDb(LEGACY_FUNNEL_DB),
      ])
        .then(function () {
          clearLocalStorage();
          document.getElementById("status").className = "ok";
          document.getElementById("status").textContent =
            "Done. Cleared shared chat DBs, per-conversation dealioo-chat-* DBs, and funnel templates. Refresh Guest Chats.";
        })
        .catch(function (error) {
          document.getElementById("status").className = "err";
          document.getElementById("status").textContent =
            "Could not clear cache: " + (error && error.message ? error.message : String(error));
        });
    </script>
  </body>
</html>
